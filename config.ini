[server]
name = Zomboid Server
language = es

[bot]
token =

[rcon]
host = 127.0.0.1
port = 27015
password =

[sftp]
host = 127.0.0.1
port = 22
user =
password =
log_path = /path/to/server/console.txt

[heartbeat]
enabled = true
interval_minutes = 1
offline_fail_threshold = 3

[modcheck]
enabled = true
interval_minutes = 30
after_check_wait_seconds = 5
save_wait_seconds = 5
log_search_text = CheckModsNeedUpdate: Mods need update
countdown_enabled = true

[restart_watch]
enabled = true
check_interval_minutes = 1
max_wait_minutes = 10

[security]
unknown_user_rate_limit_per_minute = 8
known_user_rate_limit_per_minute = 20
failed_code_limit = 3
failed_code_window_minutes = 15
temporary_block_minutes = 15
invite_code_expire_minutes = 15
invite_code_length = 8
